name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Extract the source code.
        uses: actions/checkout@v6

      - name: Create datapack zip
        run: |
          zip -r inv_gui-${{ github.ref_name }}.zip \
            data/ pack.mcmeta README.md CHANGELOG.md docs/ \
            -x "*.git*"

      - name: Create a GitHub Release
        uses: softprops/action-gh-release@v3
        if: github.ref_type == 'tag'
        with:
          files: inv_gui-${{ github.ref_name }}.zip
          body_path: CHANGELOG.md
          name: inv_gui ${{ github.ref_name }}
          generate_release_notes: false
